<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#16a34a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="NoSpoil" />
  <title>No Fridge Spoil</title>

  <!-- Social Media Preview (Open Graph) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="No Fridge Spoil - Stop Food Waste" />
  <meta property="og:description"
    content="Track food expiration dates, get AI recipes, and save money. Your smart kitchen companion." />
  <meta property="og:image" content="/og-image.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="No Fridge Spoil" />
  <meta name="twitter:description" content="Track food expiration dates, get AI recipes, and save money." />
  <meta name="twitter:image" content="/og-image.png" />

  <!-- Favicon & PWA -->
  <link rel="icon" type="image/png" href="/pwa-192x192.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- Custom Fonts: Fraunces (display), DM Sans (body), JetBrains Mono (data) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
  <div id="root"></div>
  <!-- Register Service Worker for PWA + Notifications -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.warn('SW registration failed:', err));
      });
    }
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
